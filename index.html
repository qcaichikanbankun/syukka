<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>かんばん照合ツール</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #007aff;
            --success-color: #34c759;
            --danger-color: #ff3b30;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
        }

        body {
            font-family: 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-main);
            height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center;
        }

        .app-container {
            width: 100%; max-width: 500px; height: 100%;
            padding: 5px 10px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        h1 { font-size: 1.1rem; text-align: center; color: #fff; margin: 5px 0; font-weight: 800; }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 8px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.4);
        }

        .camera-card { padding: 5px; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; }
        #reader video { max-height: 35vh !important; object-fit: cover !important; }

        .instruction {
            font-size: 1rem; font-weight: bold; color: var(--primary-color);
            text-align: center; padding: 5px; background: rgba(0, 122, 255, 0.1);
            border-radius: 8px; margin-bottom: 5px;
        }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .data-box {
            background: #f2f2f7; padding: 5px; border-radius: 6px;
            text-align: center; border: 1px solid #e5e5ea;
        }
        .data-box .label { font-size: 0.7rem; color: var(--text-sub); }
        .data-box .value { font-size: 0.75rem; word-break: break-all; margin-top: 2px; color: #888; height: 1.2em; overflow: hidden; }
        .data-box .parsed-value { font-size: 0.9rem; font-weight: bold; color: var(--primary-color); margin-top: 4px; }
        .parsed-ng { color: var(--danger-color) !important; }

        .history-card { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; margin-bottom: 0; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .history-header h2 { margin: 0; font-size: 0.9rem; }
        
        .btn { border: none; padding: 6px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .btn-csv { background: var(--success-color); color: white; }
        .btn-clear { background: #e5e5ea; color: var(--text-main); }

        .table-container { flex-grow: 1; overflow-y: auto; border-radius: 6px; border: 1px solid #e5e5ea; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th, td { padding: 4px; text-align: center; border-bottom: 1px solid #e5e5ea; word-break: break-all;}
        th { background-color: #f2f2f7; position: sticky; top: 0; z-index: 10; color: var(--text-sub); }
        .row-ok td { background-color: rgba(52, 199, 89, 0.1); }
        .row-ng td { background-color: rgba(255, 59, 48, 0.1); color: var(--danger-color); font-weight: bold; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .result-text { font-size: 5rem; font-weight: 900; margin-bottom: 10px; }
        .match-ok { background: linear-gradient(135deg, #34c759 0%, #28a745 100%); }
        
        #lock-screen { background: linear-gradient(135deg, #ff3b30 0%, #dc3545 100%); text-align: center; }
        .lock-box {
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); color: var(--text-main);
            width: 80%; max-width: 300px;
        }
        .lock-box h3 { margin: 0 0 15px 0; color: var(--danger-color); }
        .pw-input {
            width: 100%; padding: 15px; font-size: 1.5rem; text-align: center;
            border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 15px;
            -webkit-text-security: disc;
        }
        .btn-unlock {
            width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold;
            background: var(--text-main); color: white; border: none; border-radius: 10px;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .btn-start { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 30px; background: white; color: #764ba2; border: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="margin-bottom: 30px;">かんばん照合システム</h2>
        <button class="btn-start" onclick="initApp()">作業を開始する</button>
    </div>

    <div class="app-container">
        <h1>かんばん照合ツール</h1>
        <div class="glass-card camera-card"><div id="reader"></div></div>
        <div class="glass-card">
            <div id="instruction" class="instruction">1. 工程内かんばんをスキャン</div>
            <div class="status-grid">
                <div class="data-box">
                    <div class="label">工程内</div>
                    <div id="data1" class="value">読取待機...</div>
                    <div id="parsed1" class="parsed-value">---</div>
                </div>
                <div class="data-box">
                    <div class="label">客先</div>
                    <div id="data2" class="value">読取待機...</div>
                    <div id="parsed2" class="parsed-value">---</div>
                </div>
            </div>
        </div>
        <div class="glass-card history-card">
            <div class="history-header">
                <h2 id="history-count">履歴 (0件)</h2>
                <div><button class="btn btn-clear" onclick="clearHistory()">消去</button><button class="btn btn-csv" onclick="exportAndShareCSV()">CSV</button></div>
            </div>
            <div class="table-container"><table><thead><tr><th>時間</th><th>工程内(抽出)</th><th>客先(抽出)</th><th>判定</th></tr></thead><tbody id="history-tbody"></tbody></table></div>
        </div>
    </div>

    <div id="ok-overlay" class="overlay match-ok">
        <div class="result-text">OK</div>
        <div style="font-size: 1.2rem;">品番・背番号 一致</div>
    </div>

    <div id="lock-screen" class="overlay">
        <div class="result-text" style="margin-bottom: 10px;">NG!!</div>
        <div style="font-size: 1.2rem; margin-bottom: 20px; font-weight:bold;">不一致が発生しました</div>
        <div class="lock-box">
            <h3>ロック中</h3>
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">責任者が解除してください</p>
            <input type="number" id="pw-input" class="pw-input" placeholder="PASS" inputmode="numeric">
            <button class="btn-unlock" onclick="checkPassword()">解除</button>
        </div>
    </div>

    <script>
        let html5QrCode;
        let step = 1;
        let k1Parsed = null;
        let k2Parsed = null;
        let canScan = true;
        let historyData = JSON.parse(localStorage.getItem('kanbanHistory')) || [];
        let audioCtx;

        function initApp() {
            document.getElementById('start-screen').style.display = 'none';
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            renderHistory();
            startCamera();
        }

        function playTone(frequency, type, duration) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);
        }

        function playScanSound() { playTone(1200, 'sine', 0.1); }
        function playOkSound() { playTone(880, 'sine', 0.1); setTimeout(() => playTone(1760, 'sine', 0.2), 100); }
        function playNgSound() { playTone(300, 'sawtooth', 0.6); }

        // ■■■ 最重要：かんばんデータの解析と抽出ロジック ■■■
        function parseKanban(data) {
            // 途中の改行(\r \n)を削除して1行の綺麗なデータにする（463の例の対策）
            let cleanText = data.replace(/[\r\n]/g, '');
            let result = { type: 'unknown', partNum: '', baseNum: '', raw: cleanText };

            // 1. 客先かんばんの解析（スペース区切りで5番目のブロックを探す）
            let parts = cleanText.split(/\s+/);
            if (parts.length >= 5 && parts[0].startsWith("JT")) {
                let block5 = parts[4];
                if (block5.length >= 15) {
                    result.type = 'customer';
                    result.baseNum = block5.substring(0, 3);    // 最初の3桁 (背番号)
                    result.partNum = block5.substring(3, 15);   // 次の12桁 (品番)
                    return result;
                }
            }

            // 2. 工程内かんばんの解析（正規表現で末尾付近の規則を探す）
            // 法則: 12文字の英数字 + スペース + 3桁の数字 + ハイフン
            let match = cleanText.match(/([A-Z0-9]{12})\s+(\d{3})-?$/);
            if (match) {
                result.type = 'inprocess';
                result.partNum = match[1];  // 12桁の品番
                result.baseNum = match[2];  // 3桁の背番号
                return result;
            }

            // もしマッチしなかった場合は「不明なQR」として返す
            return result;
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (!canScan || step === 3) return;

            // 読み取ったデータを即座に解析する
            let parsed = parseKanban(decodedText);

            // 関係ないQRを読んだ場合のポカヨケ
            if (parsed.type === 'unknown') {
                playNgSound();
                alert("エラー：かんばんのQRコードではありません。\n\n読取内容：\n" + decodedText);
                pauseScanning(2000);
                return;
            }

            if (navigator.vibrate) navigator.vibrate(50);
            playScanSound();

            if (step === 1) {
                k1Parsed = parsed;
                document.getElementById('data1').innerText = "完了";
                document.getElementById('parsed1').innerText = `${parsed.baseNum} / ${parsed.partNum}`;
                document.getElementById('parsed1').className = "parsed-value";

                document.getElementById('instruction').innerText = "2. 客先かんばんをスキャン";
                document.getElementById('instruction').style.color = "#ff9500";
                step = 2; pauseScanning(1000);

            } else if (step === 2) {
                k2Parsed = parsed;
                document.getElementById('data2').innerText = "完了";
                document.getElementById('parsed2').innerText = `${parsed.baseNum} / ${parsed.partNum}`;
                step = 3; checkMatch();
            }
        }

        function checkMatch() {
            // 品番(12桁)と背番号(3桁)が両方一致しているかを判定する
            let isOk = (k1Parsed.partNum === k2Parsed.partNum) && (k1Parsed.baseNum === k2Parsed.baseNum);
            
            saveHistory(isOk);

            if (isOk) {
                document.getElementById('ok-overlay').style.display = 'flex';
                playOkSound();
                if (navigator.vibrate) navigator.vibrate([100, 100, 100]);
                setTimeout(() => {
                    document.getElementById('ok-overlay').style.display = 'none';
                    resetScanner();
                }, 1500);
            } else {
                document.getElementById('parsed1').classList.add('parsed-ng');
                document.getElementById('parsed2').classList.add('parsed-ng');
                document.getElementById('lock-screen').style.display = 'flex';
                playNgSound();
                if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
                document.getElementById('pw-input').focus();
            }
        }

        function checkPassword() {
            const pw = document.getElementById('pw-input').value;
            if (pw === "8181") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('pw-input').value = "";
                resetScanner();
            } else {
                alert("パスワードが違います");
                document.getElementById('pw-input').value = "";
            }
        }

        function saveHistory(isOk) {
            const now = new Date();
            const timeStr = ('0' + now.getHours()).slice(-2) + ':' + ('0' + now.getMinutes()).slice(-2) + ':' + ('0' + now.getSeconds()).slice(-2);
            // 履歴には抽出したわかりやすいデータを残す
            const k1Display = `${k1Parsed.baseNum} / ${k1Parsed.partNum}`;
            const k2Display = `${k2Parsed.baseNum} / ${k2Parsed.partNum}`;
            
            historyData.unshift({ time: timeStr, k1: k1Display, k2: k2Display, result: isOk ? "OK" : "NG", isOk: isOk });
            localStorage.setItem('kanbanHistory', JSON.stringify(historyData));
            renderHistory();
        }

        function renderHistory() {
            const tbody = document.getElementById('history-tbody');
            tbody.innerHTML = '';
            historyData.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = item.isOk ? 'row-ok' : 'row-ng';
                tr.innerHTML = `<td>${item.time}</td><td>${item.k1}</td><td>${item.k2}</td><td>${item.result}</td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('history-count').innerText = `履歴 (${historyData.length}件)`;
        }

        function clearHistory() {
            if (confirm("履歴をすべて消去しますか？")) {
                historyData = []; localStorage.removeItem('kanbanHistory'); renderHistory();
            }
        }

        function exportAndShareCSV() {
            if (historyData.length === 0) return;
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            let csv = "日時,工程内かんばん(抽出データ),客先かんばん(抽出データ),判定\n";
            historyData.forEach(item => csv += `"${item.time}","${item.k1}","${item.k2}","${item.result}"\n`);
            const blob = new Blob([bom, csv], { type: 'text/csv' });
            const file = new File([blob], "kanban_log.csv", { type: 'text/csv' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({ title: '照合履歴', files: [file] });
            } else {
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "kanban_log.csv"; a.click();
            }
        }

        function resetScanner() {
            step = 1;
            k1Parsed = null; k2Parsed = null;
            document.getElementById('data1').innerText = "読取待機...";
            document.getElementById('parsed1').innerText = "---";
            document.getElementById('parsed1').className = "parsed-value";
            
            document.getElementById('data2').innerText = "読取待機...";
            document.getElementById('parsed2').innerText = "---";
            document.getElementById('parsed2').className = "parsed-value";
            
            document.getElementById('instruction').innerText = "1. 工程内かんばんをスキャン";
            document.getElementById('instruction').style.color = "var(--primary-color)";
            pauseScanning(500);
        }

        function pauseScanning(ms) {
            canScan = false; setTimeout(() => { canScan = true; }, ms);
        }

        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 15, qrbox: { width: 200, height: 200 }, aspectRatio: 1.33 };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
                .catch(err => alert("カメラ起動エラー: " + err));
        }
    </script>
</body>
</html>
