<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="かんばん照合">
    <title>かんばん照合システム</title>
    <style>
        :root { --primary-color: #007aff; --success-color: #34c759; --danger-color: #ff3b30; --card-bg: rgba(255, 255, 255, 0.95); }
        body { font-family: 'SF Pro Text', sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; height: 100%; padding: 25px 10px 10px 10px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .camera-card { padding: 15px 10px; text-align: center; background: var(--card-bg); border-radius: 12px; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-scan { width: 100%; padding: 20px; font-size: 1.3rem; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,122,255,0.3); cursor: pointer; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .data-box { background: #f2f2f7; padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #e5e5ea; }
        .data-box .label { font-size: 0.8rem; color: #8e8e93; }
        .data-box .parsed-value { font-size: 1.1rem; font-weight: bold; color: var(--primary-color); margin-top: 5px; }
        
        .history-card { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; background: var(--card-bg); border-radius: 12px; padding: 10px; margin-top: 8px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.95rem; font-weight: bold; color: #333; }
        .history-header button { background: #6c757d; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; }
        .history-header .btn-csv { background: var(--success-color); }
        
        .table-container { flex-grow: 1; overflow-y: auto; border: 1px solid #e5e5ea; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th, td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #e5e5ea; }
        th { background: #f2f2f7; position: sticky; top: 0; z-index: 10; }
        .row-ok td { background-color: rgba(52, 199, 89, 0.1); }
        .row-ng td { background-color: rgba(255, 59, 48, 0.1); color: var(--danger-color); font-weight: bold; }
        
        /* オーバーレイ（結果画面） */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .match-ok { background: rgba(40, 167, 69, 0.95); }
        .match-ng { background: rgba(220, 53, 69, 0.95); }
        
        /* ロック画面用 */
        .lock-box { background: white; padding: 25px 20px; border-radius: 20px; color: #1c1c1e; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .lock-box h2 { color: var(--danger-color); margin-top: 0; }
        .pw-input { width: 100%; padding: 12px; font-size: 1.5rem; text-align: center; border: 2px solid #ddd; border-radius: 10px; margin: 15px 0; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1 style="font-size: 1.1rem; color: white; text-align: center; margin: 5px 0;">かんばん照合・出荷管理</h1>
        <div class="camera-card">
            <button class="btn-scan" onclick="startShortcutScan()">📷 スキャン開始</button>
            <div class="status-grid">
                <div class="data-box"><div class="label">工程内</div><div id="parsed1" class="parsed-value">---</div></div> 
                <div class="data-box"><div class="label">客先</div><div id="parsed2" class="parsed-value">---</div></div>
            </div>
        </div>

        <div class="history-card">
            <div class="history-header">
                <span id="history-count">履歴 (0)</span>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-csv" onclick="autoSendCSV()">CSV送信</button>
                    <button onclick="clearHistory()">消去</button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40%;">日時</th>
                            <th style="width: 25%;">工程内</th>
                            <th style="width: 25%;">客先</th>
                            <th style="width: 10%;">判定</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="ok-overlay" class="overlay match-ok">
        <h1 style="font-size: 4rem; margin: 0;">一致 OK</h1>
    </div>

    <div id="lock-screen" class="overlay match-ng">
        <div class="lock-box">
            <h2>不一致 NG!!</h2>
            <p style="font-size: 0.9rem; color: #555;">管理者を呼んで<br>解除パスワードを入力してください</p>
            <input type="password" id="pw-input" class="pw-input" placeholder="****">
            <button class="btn-scan" style="background:#1c1c1e; padding:15px; margin-top:5px;" onclick="checkPassword()">ロック解除</button>
        </div>
    </div>

<script>
        let historyData = JSON.parse(localStorage.getItem('kanbanHistory')) || [];
        
        // オーディオ設定
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 画面タッチで音の制限を解除（iPhone対策）
        document.body.addEventListener('touchstart', () => { 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }, { once: true });

        // 音を鳴らす機能
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'ok') {
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else {
                osc.type = 'sawtooth'; 
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        // 初期読み込み時＆データ受け取り時の処理
        window.onload = function() {
            renderHistory();
            
            const urlParams = new URLSearchParams(window.location.search);
            const k1 = urlParams.get('k1');
            const k2 = urlParams.get('k2');
            
            if (k1 && k2) {
                setTimeout(() => processScanData(k1, k2), 300);
                window.history.replaceState(null, '', window.location.pathname);
            }
        };

        // ★修正箇所：通常の方法でショートカットを起動するように戻しました★
        function startShortcutScan() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            window.location.href = `shortcuts://run-shortcut?name=${encodeURIComponent("かんばんスキャン")}`;
        }

        function parseKanban(data) {
            let cleanText = data.replace(/[\r\n]/g, '').trim();
            let parts = cleanText.split(/\s+/);
            
            if (parts.length >= 5 && parts[0].startsWith("JT")) {
                let b5 = parts[4];
                return { part: b5.substring(3, 15), base: b5.substring(0, 3) };
            }
            
            let match = cleanText.match(/([A-Z0-9]{12})\s+(\d{3})-?$/);
            if (match) return { part: match[1], base: match[2] };
            
            return null;
        }

        // 照合・判定機能
        function processScanData(k1Raw, k2Raw) {
            const p1 = parseKanban(decodeURIComponent(k1Raw));
            const p2 = parseKanban(decodeURIComponent(k2Raw));
            
            if (!p1 || !p2) { 
                alert("かんばん規格外エラー：正しく読み取れませんでした。");
                return; 
            }
            
            document.getElementById('parsed1').innerText = `${p1.base}/${p1.part}`;
            document.getElementById('parsed2').innerText = `${p2.base}/${p2.part}`;
            
            let isOk = (p1.part === p2.part) && (p1.base === p2.base);
            
            // 日時を yyyy/mm/dd hh:mm:ss 形式で作成
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const dateStr = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const formattedDateTime = `${year}/${month}/${dateStr} ${hours}:${minutes}:${seconds}`;

            historyData.unshift({ 
                datetime: formattedDateTime,
                k1: `${p1.base}/${p1.part}`, 
                k2: `${p2.base}/${p2.part}`, 
                isOk: isOk 
            });
            
            localStorage.setItem('kanbanHistory', JSON.stringify(historyData));
            renderHistory();
            
            if (isOk) {
                playSound('ok');
                document.getElementById('ok-overlay').style.display = 'flex';
                setTimeout(() => { document.getElementById('ok-overlay').style.display = 'none'; }, 1500);
            } else {
                playSound('ng');
                document.getElementById('lock-screen').style.display = 'flex';
                document.getElementById('pw-input').focus();
            }
        }

        function renderHistory() {
            const tbody = document.getElementById('history-tbody');
            tbody.innerHTML = historyData.map(item => `
                <tr class="${item.isOk ? 'row-ok' : 'row-ng'}">
                    <td style="font-size: 0.65rem;">${item.datetime}</td>
                    <td>${item.k1}</td>
                    <td>${item.k2}</td>
                    <td>${item.isOk ? 'OK':'NG'}</td>
                </tr>
            `).join('');
            document.getElementById('history-count').innerText = `履歴 (${historyData.length})`;
        }

        function checkPassword() {
            if (document.getElementById('pw-input').value === "8181") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('pw-input').value = "";
            } else { 
                alert("パスワードが違います"); 
            }
        }

        function clearHistory() { 
            if (confirm("履歴をすべて消去しますか？")) { 
                historyData = [];
                localStorage.removeItem('kanbanHistory'); 
                renderHistory(); 
            } 
        }

        // CSV送信機能
        function autoSendCSV() {
            if (historyData.length === 0) { 
                alert("送信するデータがありません。");
                return; 
            }
            
            let csv = "日時,工程内,客先,判定\n" + historyData.map(i => `"${i.datetime}","${i.k1}","${i.k2}","${i.isOk ? 'OK':'NG'}"`).join("\n");
            const encodedCsv = encodeURIComponent(csv);
            
            // ★修正箇所：こちらも通常の方法に戻しました★
            window.location.href = `shortcuts://run-shortcut?name=${encodeURIComponent("かんばんCSV送信")}&input=${encodedCsv}`;
            
            setTimeout(() => { 
                if (confirm("送信しました。画面上の履歴をリセットしますか？")) { 
                    historyData = []; 
                    localStorage.removeItem('kanbanHistory'); 
                    renderHistory(); 
                } 
            }, 1500);
        }
    </script>
</body>
</html>
