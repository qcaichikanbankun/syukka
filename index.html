<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="かんばん照合">
    
    <title>かんばん照合システム</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #007aff;
            --success-color: #34c759;
            --danger-color: #ff3b30;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'SF Pro Text', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* ホーム画面用：上部のステータスバーが重ならないように少し余白を空ける */
        .app-container {
            width: 100%; max-width: 500px; height: 100%;
            padding: 25px 10px 10px 10px; /* 上部を少し広げた */
            box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        .camera-card { padding: 5px; position: relative; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; }
        #reader video { width: 100% !important; max-height: 40vh !important; object-fit: cover !important; }

        .zoom-container {
            margin: 5px 0; padding: 10px; background: rgba(0,0,0,0.6);
            border-radius: 10px; color: white; display: flex; align-items: center; gap: 10px;
        }
        .zoom-container input { flex-grow: 1; accent-color: var(--primary-color); }

        .instruction {
            font-size: 1rem; font-weight: bold; color: var(--primary-color);
            text-align: center; padding: 5px; background: rgba(0, 122, 255, 0.1);
            border-radius: 8px; margin-bottom: 5px;
        }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .data-box {
            background: #f2f2f7; padding: 5px; border-radius: 6px;
            text-align: center; border: 1px solid #e5e5ea;
        }
        .data-box .label { font-size: 0.7rem; color: #8e8e93; }
        .data-box .parsed-value { font-size: 0.85rem; font-weight: bold; color: var(--primary-color); margin-top: 2px; }

        .history-card { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; margin-bottom: 0; background: var(--card-bg); border-radius: 12px; padding: 8px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .table-container { flex-grow: 1; overflow-y: auto; border: 1px solid #e5e5ea; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.65rem; }
        th, td { padding: 4px 2px; text-align: center; border-bottom: 1px solid #e5e5ea; }
        th { background: #f2f2f7; position: sticky; top: 0; }
        .row-ok td { background-color: rgba(52, 199, 89, 0.1); }
        .row-ng td { background-color: rgba(255, 59, 48, 0.1); color: var(--danger-color); font-weight: bold; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .match-ok { background: linear-gradient(135deg, #34c759 0%, #28a745 100%); }
        .match-ng { background: linear-gradient(135deg, #ff3b30 0%, #dc3545 100%); }
        .lock-box { background: white; padding: 20px; border-radius: 20px; color: #1c1c1e; width: 80%; max-width: 300px; text-align: center; }
        .pw-input { width: 100%; padding: 12px; font-size: 1.5rem; text-align: center; border: 2px solid #ddd; border-radius: 10px; margin: 10px 0; }

        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #764ba2; z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .btn-start { padding: 15px 40px; font-size: 1.2rem; border-radius: 30px; border: none; background: white; color: #764ba2; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="margin-bottom: 30px;">かんばん照合システム</h2>
        <button class="btn-start" onclick="initApp()">作業を開始する</button>
    </div>

    <div class="app-container">
        <h1 style="font-size: 1rem; color: white; text-align: center; margin: 5px 0;">かんばん照合ツール</h1>
        
        <div class="glass-card camera-card">
            <div id="reader"></div>
            <div class="zoom-container" id="zoom-panel" style="display:none;">
                <span style="font-size:0.8rem;">🔍 ズーム</span>
                <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
            </div>
        </div>

        <div class="glass-card" style="background:var(--card-bg); padding:8px; border-radius:12px; margin-bottom:8px;">
            <div id="instruction" class="instruction">1. 工程内かんばんをスキャン</div>
            <div class="status-grid">
                <div class="data-box">
                    <div class="label">工程内</div>
                    <div id="parsed1" class="parsed-value">---</div>
                </div>
                <div class="data-box">
                    <div class="label">客先</div>
                    <div id="parsed2" class="parsed-value">---</div>
                </div>
            </div>
        </div>

        <div class="history-card">
            <div class="history-header">
                <span id="history-count" style="font-size:0.8rem; font-weight:bold;">履歴 (0)</span>
                <div>
                    <button onclick="clearHistory()" style="font-size:0.7rem; padding:4px 8px;">消去</button>
                    <button onclick="autoSendCSV()" style="font-size:0.7rem; padding:4px 8px; background:var(--success-color); color:white; border:none; border-radius:4px;">CSV送信</button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>日付/時間</th><th>工程</th><th>客先</th><th>判定</th></tr></thead>
                    <tbody id="history-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="ok-overlay" class="overlay match-ok">
        <div style="font-size: 5rem; font-weight: 900;">OK</div>
    </div>

    <div id="lock-screen" class="overlay match-ng">
        <div style="font-size: 4rem; font-weight: 900; margin-bottom: 20px;">NG!!</div>
        <div class="lock-box">
            <h3 style="color:var(--danger-color); margin:0;">不一致ロック</h3>
            <input type="number" id="pw-input" class="pw-input" placeholder="PASS" inputmode="numeric">
            <button onclick="checkPassword()" style="width:100%; padding:12px; background:#1c1c1e; color:white; border:none; border-radius:10px; font-weight:bold;">解除</button>
        </div>
    </div>

    <script>
        let html5QrCode;
        let step = 1;
        let k1Parsed = null;
        let k2Parsed = null;
        let canScan = true;
        let historyData = JSON.parse(localStorage.getItem('kanbanHistory')) || [];
        let audioCtx;

        function initApp() {
            document.getElementById('start-screen').style.display = 'none';
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            renderHistory();
            startCamera();
        }

        function parseKanban(data) {
            let cleanText = data.replace(/[\r\n]/g, '').trim();
            let result = { type: 'unknown', partNum: '', baseNum: '' };
            let parts = cleanText.split(/\s+/);
            if (parts.length >= 5 && parts[0].startsWith("JT")) {
                let block5 = parts[4];
                if (block5.length >= 15) {
                    result.type = 'customer';
                    result.baseNum = block5.substring(0, 3);
                    result.partNum = block5.substring(3, 15);
                    return result;
                }
            }
            let match = cleanText.match(/([A-Z0-9]{12})\s+(\d{3})-?$/);
            if (match) {
                result.type = 'inprocess';
                result.partNum = match[1];
                result.baseNum = match[2];
                return result;
            }
            return result;
        }

        function onScanSuccess(decodedText) {
            if (!canScan || step === 3) return;
            let parsed = parseKanban(decodedText);
            if (parsed.type === 'unknown') return; 
            if (navigator.vibrate) navigator.vibrate(50);
            
            if (step === 1) {
                k1Parsed = parsed;
                document.getElementById('parsed1').innerText = `${parsed.baseNum}/${parsed.partNum}`;
                document.getElementById('instruction').innerText = "2. 客先かんばんをスキャン";
                document.getElementById('instruction').style.color = "#ff9500";
                step = 2; pauseScanning(1000);
            } else if (step === 2) {
                k2Parsed = parsed;
                document.getElementById('parsed2').innerText = `${parsed.baseNum}/${parsed.partNum}`;
                step = 3; checkMatch();
            }
        }

        function checkMatch() {
            let isOk = (k1Parsed.partNum === k2Parsed.partNum) && (k1Parsed.baseNum === k2Parsed.baseNum);
            saveHistory(isOk);
            if (isOk) {
                document.getElementById('ok-overlay').style.display = 'flex';
                setTimeout(() => { document.getElementById('ok-overlay').style.display = 'none'; resetScanner(); }, 1500);
            } else {
                document.getElementById('lock-screen').style.display = 'flex';
                document.getElementById('pw-input').focus();
            }
        }

        function saveHistory(isOk) {
            const now = new Date();
            historyData.unshift({ 
                date: now.toLocaleDateString(), 
                time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}), 
                k1: `${k1Parsed.baseNum}/${k1Parsed.partNum}`, 
                k2: `${k2Parsed.baseNum}/${k2Parsed.partNum}`, 
                result: isOk ? "OK" : "NG", isOk: isOk 
            });
            localStorage.setItem('kanbanHistory', JSON.stringify(historyData));
            renderHistory();
        }

        function renderHistory() {
            const tbody = document.getElementById('history-tbody');
            tbody.innerHTML = historyData.map(item => `
                <tr class="${item.isOk ? 'row-ok' : 'row-ng'}">
                    <td>${item.date}<br>${item.time}</td>
                    <td>${item.k1}</td><td>${item.k2}</td><td>${item.result}</td>
                </tr>
            `).join('');
            document.getElementById('history-count').innerText = `履歴 (${historyData.length})`;
        }

        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");
            
            // ★変更点1：qrbox（枠）を完全に削除。画面のどこにQRがあっても最高画質で検知させます。
            const config = { 
                fps: 15,
                formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] // QR専用モードで爆速化
            };

            // ★変更点2：iPhoneのメインカメラをフルHD（1080p）で強制起動させる設定
            const videoConstraints = {
                facingMode: "environment",
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            };

            // カメラ起動実行
            html5QrCode.start(videoConstraints, config, onScanSuccess)
            .then(() => {
                // ズーム設定（iOSの仕様でブロックされる場合は無視されます）
                const videoElement = document.querySelector("#reader video");
                if (videoElement && videoElement.srcObject) {
                    const videoTrack = videoElement.srcObject.getVideoTracks()[0];
                    if (videoTrack && typeof videoTrack.getCapabilities === 'function') {
                        const cap = videoTrack.getCapabilities();
                        if (cap.zoom) {
                            document.getElementById('zoom-panel').style.display = 'flex';
                            const slider = document.getElementById('zoom-slider');
                            slider.min = cap.zoom.min; slider.max = cap.zoom.max; slider.step = cap.zoom.step;
                            slider.addEventListener('input', () => videoTrack.applyConstraints({ advanced: [{ zoom: slider.value }] }));
                        }
                    }
                }
            })
            .catch(err => {
                // 万が一フルHD起動に失敗した場合は、標準設定で保険のリトライ
                html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
            });
        }



        function checkPassword() {
            if (document.getElementById('pw-input').value === "8181") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('pw-input').value = "";
                resetScanner();
            } else { alert("PASS間違い"); document.getElementById('pw-input').value = ""; }
        }

        function resetScanner() {
            step = 1; k1Parsed = null; k2Parsed = null;
            document.getElementById('parsed1').innerText = "---";
            document.getElementById('parsed2').innerText = "---";
            document.getElementById('instruction').innerText = "1. 工程内かんばんをスキャン";
            document.getElementById('instruction').style.color = "var(--primary-color)";
            pauseScanning(500);
        }

        function pauseScanning(ms) { canScan = false; setTimeout(() => { canScan = true; }, ms); }
        function clearHistory() { if (confirm("全消去？")) { historyData = []; localStorage.removeItem('kanbanHistory'); renderHistory(); } }
        
        function autoSendCSV() {
            if (historyData.length === 0) { alert("データなし"); return; }
            let csv = "日付,時間,工程内,客先,判定\n" + historyData.map(i => `"${i.date}","${i.time}","${i.k1}","${i.k2}","${i.result}"`).join("\n");
            
            const shortcutName = encodeURIComponent("かんばんCSV送信");
            const encodedCsv = encodeURIComponent(csv);

            // ホーム画面からでも、Safariからでも動作するURLスキーム
            window.location.href = `shortcuts://run-shortcut?name=${shortcutName}&input=${encodedCsv}`;

            setTimeout(() => {
                if (confirm("送信しました。履歴をリセットしますか？")) {
                    historyData = []; localStorage.removeItem('kanbanHistory'); renderHistory();
                }
            }, 1500);
        }
    </script>
</body>
</html>
